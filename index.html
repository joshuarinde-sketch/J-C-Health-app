<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="J&C Health">
<link rel="manifest" href="manifest.json">
<title>Joshua & Carleigh — Health Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--black:#0a0a0a;--dark:#0f1115;--card:#161a1f;--card2:#1c2028;--border:#23272f;--border2:#2d323c;--orange:#ff5c1a;--orange-dim:rgba(255,92,26,0.12);--blue:#3d9cf5;--blue-dim:rgba(61,156,245,0.12);--green:#27c97e;--green-dim:rgba(39,201,126,0.1);--red:#ff4757;--red-dim:rgba(255,71,87,0.12);--yellow:#fbbf24;--yellow-dim:rgba(251,191,36,0.12);--purple:#a78bfa;--purple-dim:rgba(167,139,250,0.12);--text:#eef0f4;--muted:#5a6072;--muted2:#7a8099;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--black);color:var(--text);display:flex;flex-direction:column;height:100dvh;}
#splash{position:fixed;inset:0;background:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s;}
#splash.out{opacity:0;pointer-events:none;}
.splash-logo{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:4px;line-height:1;}
.splash-logo .j{color:var(--orange);}.splash-logo .c{color:var(--blue);}
.splash-sub{color:var(--muted);font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-top:6px;}
.splash-bar{width:120px;height:3px;background:var(--border);border-radius:10px;margin-top:32px;overflow:hidden;}
.splash-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--blue));animation:load 1.5s ease forwards;}
@keyframes load{from{width:0}to{width:100%}}
#configScreen{display:none;position:fixed;inset:0;background:var(--black);align-items:center;justify-content:center;padding:24px;z-index:500;overflow-y:auto;}
#configScreen.show{display:flex;}
.cfg-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;max-width:440px;width:100%;}
.cfg-card h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;margin-bottom:4px;}
.cfg-card p{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6;}
.cfg-input{width:100%;background:var(--black);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);margin-bottom:10px;outline:none;transition:border-color .2s;}
.cfg-input:focus{border-color:var(--orange);}
.cfg-input::placeholder{color:var(--muted);}
.cfg-btn{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--orange),#ff8c42);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;cursor:pointer;margin-top:8px;}
#app{display:none;flex-direction:column;height:100dvh;overflow:hidden;}
#app.show{display:flex;}
.hdr{background:var(--dark);border-bottom:1px solid var(--border);padding:0 16px;flex-shrink:0;}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;height:56px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;}
.logo .j{color:var(--orange);}.logo .c{color:var(--blue);}
.sync-badge{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;padding:4px 10px;border-radius:20px;transition:all .3s;}
.sync-badge.synced{background:var(--green-dim);color:var(--green);}
.sync-badge.syncing{background:var(--orange-dim);color:var(--orange);}
.sync-badge.offline{background:var(--border);color:var(--muted);}
.person-bar{display:flex;gap:8px;padding:10px 16px;background:var(--dark);border-bottom:1px solid var(--border);flex-shrink:0;}
.person-pill{flex:1;padding:9px;border-radius:10px;border:1.5px solid var(--border);background:transparent;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1.5px;cursor:pointer;transition:all .2s;color:var(--muted);text-align:center;}
.person-pill.j.active{background:var(--orange);border-color:var(--orange);color:#fff;}
.person-pill.c.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.bottom-nav{display:flex;background:var(--dark);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;padding:10px 4px 8px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .2s;color:var(--muted);}
.nav-btn .nav-icon{font-size:20px;line-height:1;}
.nav-btn .nav-label{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;}
.nav-btn.active-j{color:var(--orange);}
.nav-btn.active-c{color:var(--blue);}
.page{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;scrollbar-width:none;}
.page::-webkit-scrollbar{display:none;}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:16px;margin-top:8px;}
.sec-title:first-child{margin-top:0;}
.date-nav{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:16px;}
.date-nav-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.date-display{text-align:center;}
.date-display .date-main{font-weight:700;font-size:15px;color:var(--text);}
.date-display .date-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.today-btn{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.dash-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
.dash-card.full{grid-column:1/-1;}
.dash-val{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;line-height:1;}
.dash-val.orange{color:var(--orange);}.dash-val.blue{color:var(--blue);}.dash-val.green{color:var(--green);}.dash-val.red{color:var(--red);}.dash-val.yellow{color:var(--yellow);}.dash-val.purple{color:var(--purple);}
.dash-label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-top:4px;}
.dash-sub{font-size:12px;color:var(--muted2);margin-top:2px;}
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px;}
.ex-card.j:hover{border-color:rgba(255,92,26,.3);}.ex-card.c:hover{border-color:rgba(61,156,245,.3);}
.ex-card.done-card{opacity:.55;}
.ex-img{width:100%;height:160px;object-fit:cover;display:block;background:#0d1117;}
.ex-img-placeholder{width:100%;height:160px;background:#0d1117;display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--border2);}
.ex-body{padding:14px 16px;}
.ex-name{font-weight:700;font-size:14px;color:var(--text);display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
.ex-machine{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);background:var(--border);padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.ex-sets{background:var(--border);border-radius:7px;padding:7px 12px;font-size:13px;font-weight:600;margin-bottom:10px;}
.ex-notes{font-size:11px;color:var(--muted);font-style:italic;line-height:1.5;margin-bottom:12px;}
.ex-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.field-wrap{display:flex;flex-direction:column;gap:3px;}
.field-label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;}
.field-input{background:var(--black);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;width:100%;}
.field-input:focus{border-color:var(--orange);}
.pr-badge{font-size:10px;font-weight:700;background:var(--yellow-dim);color:var(--yellow);padding:2px 7px;border-radius:4px;}
.check-row{display:flex;align-items:center;gap:8px;cursor:pointer;padding-top:10px;border-top:1px solid var(--border);}
.check-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.check-box.done.j{background:var(--orange);border-color:var(--orange);}
.check-box.done.c{background:var(--blue);border-color:var(--blue);}
.check-box svg{display:none;}.check-box.done svg{display:block;}
.check-label{font-size:13px;color:var(--muted);}
.prog-wrap{margin-bottom:16px;}
.prog-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px;}
.prog-track{height:6px;background:var(--border);border-radius:10px;overflow:hidden;}
.prog-fill{height:100%;border-radius:10px;}
.prog-fill.j{background:var(--orange);}.prog-fill.c{background:var(--blue);}
.bp-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;}
.bp-reading-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
.bp-field{display:flex;flex-direction:column;gap:4px;}
.bp-field label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;}
.bp-input{background:var(--black);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:20px;font-weight:700;color:var(--text);outline:none;width:100%;text-align:center;}
.bp-input:focus{border-color:var(--red);}
.bp-status{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;}
.bp-status.normal{background:var(--green-dim);color:var(--green);}
.bp-status.elevated{background:var(--yellow-dim);color:var(--yellow);}
.bp-status.high{background:var(--red-dim);color:var(--red);}
.bp-status.crisis{background:rgba(255,71,87,.3);color:var(--red);}
.save-btn{width:100%;padding:12px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:12px;}
.save-btn.j{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,92,26,.3);}
.save-btn.c{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(61,156,245,.3);}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;}
.history-date{font-size:12px;color:var(--muted);font-weight:600;}
.history-val{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;}
.history-val.normal{color:var(--green);}.history-val.elevated{color:var(--yellow);}.history-val.high{color:var(--red);}
.history-note{font-size:11px;color:var(--muted);margin-top:2px;}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
.metric-label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.metric-input-row{display:flex;gap:8px;align-items:flex-end;}
.metric-input{flex:1;background:var(--black);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:18px;font-weight:700;color:var(--text);outline:none;text-align:center;}
.metric-input:focus{border-color:var(--purple);}
.metric-unit{font-size:12px;color:var(--muted);font-weight:600;padding-bottom:10px;}
.metric-trend{font-size:11px;color:var(--muted);margin-top:6px;}
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.chart-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:12px;}
.chart-area{position:relative;height:120px;width:100%;}
.chart-svg{width:100%;height:100%;}
.macro-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.macro-pill{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
.macro-pill-val{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1;}
.macro-pill-val.cal{color:var(--orange);}.macro-pill-val.pro{color:var(--blue);}.macro-pill-val.carb{color:var(--yellow);}.macro-pill-val.fat{color:var(--green);}
.macro-pill-lbl{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-top:3px;}
.meal-block{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.meal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.meal-name{font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.8px;}
.meal-kcal{font-size:12px;color:var(--muted);}
.food-cols{display:grid;grid-template-columns:1fr 60px 60px 32px;gap:6px;margin-bottom:6px;}
.food-col-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);}
.food-row{display:grid;grid-template-columns:1fr 60px 60px 32px;gap:6px;align-items:center;margin-bottom:6px;}
.food-input{background:var(--black);border:1px solid var(--border);border-radius:6px;padding:7px 8px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;width:100%;}
.del-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.del-btn:hover{background:rgba(255,71,87,.15);color:var(--red);}
.add-food-btn{width:100%;padding:8px;border-radius:8px;border:1px dashed var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;margin-top:8px;}
.water-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.cup{width:34px;height:34px;border-radius:8px;border:2px solid var(--border);background:transparent;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.cup.filled{background:#1a3a5c;border-color:var(--blue);}
.notes-area{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.notes-area h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;}
.notes-area textarea{width:100%;background:var(--black);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);resize:none;min-height:80px;outline:none;line-height:1.5;}
.mood-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.mood-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;}
.mood-btn.sel-j{background:var(--orange-dim);border-color:var(--orange);color:var(--orange);}
.mood-btn.sel-c{background:var(--blue-dim);border-color:var(--blue);color:var(--blue);}
.rest-day{text-align:center;padding:60px 20px;color:var(--muted);}
.rest-day .rest-icon{font-size:56px;margin-bottom:14px;}
.rest-day h2{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;margin-bottom:6px;color:var(--text);}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--border2);color:var(--text);font-weight:600;font-size:13px;padding:10px 20px;border-radius:30px;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.green{border-color:var(--green);color:var(--green);}
.sel-wrap{width:100%;background:var(--black);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;}
.txt-input{width:100%;background:var(--black);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;}
</style>
</head>
<body>
<div id="splash">
  <div class="splash-logo"><span class="j">J</span> & <span class="c">C</span></div>
  <div class="splash-sub">Health Hub</div>
  <div class="splash-bar"><div class="splash-fill"></div></div>
</div>
<div id="configScreen">
  <div class="cfg-card">
    <h1>🔥 Connect Firebase</h1>
    <p>Enter your Firebase config to sync between Joshua and Carleigh's phones in real time.</p>
    <input class="cfg-input" id="cfg_apiKey" placeholder="apiKey">
    <input class="cfg-input" id="cfg_authDomain" placeholder="authDomain">
    <input class="cfg-input" id="cfg_projectId" placeholder="projectId">
    <input class="cfg-input" id="cfg_appId" placeholder="appId">
    <button class="cfg-btn" onclick="saveConfig()">Save & Connect</button>
    <p style="font-size:12px;color:var(--muted);margin-top:14px;text-align:center">Config stored locally on this device only.</p>
  </div>
</div>
<div id="app">
  <header class="hdr">
    <div class="hdr-inner">
      <div class="logo"><span class="j">JOSHUA</span> & <span class="c">CARLEIGH</span></div>
      <div class="sync-badge syncing" id="syncBadge">⟳ Syncing</div>
    </div>
  </header>
  <div class="person-bar">
    <button class="person-pill j active" id="btnJ" onclick="setPerson('j')">⚡ Joshua</button>
    <button class="person-pill c" id="btnC" onclick="setPerson('c')">💙 Carleigh</button>
  </div>
  <div class="page" id="pageContent"></div>
  <nav class="bottom-nav" id="bottomNav">
    <button class="nav-btn" onclick="setTab('dashboard')" id="nav-dashboard"><span class="nav-icon">📊</span><span class="nav-label">Dashboard</span></button>
    <button class="nav-btn" onclick="setTab('workout')" id="nav-workout"><span class="nav-icon">💪</span><span class="nav-label">Workout</span></button>
    <button class="nav-btn" onclick="setTab('nutrition')" id="nav-nutrition"><span class="nav-icon">🥗</span><span class="nav-label">Nutrition</span></button>
    <button class="nav-btn" onclick="setTab('health')" id="nav-health"><span class="nav-icon">❤️</span><span class="nav-label">Health</span></button>
    <button class="nav-btn" onclick="setTab('history')" id="nav-history"><span class="nav-icon">📅</span><span class="nav-label">History</span></button>
  </nav>
</div>
<div class="toast" id="toast"></div>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getFirestore,doc,setDoc,onSnapshot}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const IMG='images/';

let db=null,unsub=null,appData={},person='j',tab='dashboard',viewDate=new Date();

window.saveConfig=()=>{
  const cfg={apiKey:document.getElementById('cfg_apiKey').value.trim(),authDomain:document.getElementById('cfg_authDomain').value.trim(),projectId:document.getElementById('cfg_projectId').value.trim(),appId:document.getElementById('cfg_appId').value.trim()};
  if(!cfg.apiKey||!cfg.projectId){showToast('Fill all fields','');return;}
  localStorage.setItem('fb_cfg',JSON.stringify(cfg));
  initFB(cfg);
};

function initFB(cfg){
  try{const app=initializeApp(cfg);db=getFirestore(app);listen();document.getElementById('configScreen').classList.remove('show');document.getElementById('app').classList.add('show');setSyncStatus('syncing');}
  catch(e){showToast('Firebase error: '+e.message,'');}
}

function listen(){
  if(unsub)unsub();
  unsub=onSnapshot(doc(db,'shared','healthData'),snap=>{appData=snap.exists()?snap.data():{};setSyncStatus('synced');render();},()=>setSyncStatus('offline'));
}

async function save(){
  if(!db)return;setSyncStatus('syncing');
  try{await setDoc(doc(db,'shared','healthData'),appData);setSyncStatus('synced');showToast('✓ Saved','green');}
  catch(e){setSyncStatus('offline');showToast('Save failed','');}
}

function setSyncStatus(s){const el=document.getElementById('syncBadge');el.className='sync-badge '+s;el.textContent=s==='synced'?'✓ Synced':s==='syncing'?'⟳ Syncing':'✗ Offline';}
function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(type==='green'?' green':'');clearTimeout(showToast._t);showToast._t=setTimeout(()=>t.className='toast',2000);}
function dateKey(d){return d.toISOString().slice(0,10);}
function formatDate(d){return d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});}
function isToday(d){const t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();}
function getDayData(p,d){const k=`${p}_${dateKey(d)}`;if(!appData[k])appData[k]={exercises:{},food:{Breakfast:[],Lunch:[],Dinner:[],Snacks:[]},water:0,notes:'',mood:''};return appData[k];}
function getBPHistory(p){return Object.entries(appData).filter(([k])=>k.startsWith(`bp_${p}_`)).map(([k,v])=>({date:k.replace(`bp_${p}_`,''),...v})).sort((a,b)=>b.date.localeCompare(a.date));}
function getMetricsHistory(p){return Object.entries(appData).filter(([k])=>k.startsWith(`metrics_${p}_`)).map(([k,v])=>({date:k.replace(`metrics_${p}_`,''),...v})).sort((a,b)=>b.date.localeCompare(a.date));}
function bpStatus(s,d){if(!s||!d)return{label:'—',cls:''};if(s>=180||d>=120)return{label:'CRISIS',cls:'crisis'};if(s>=140||d>=90)return{label:'HIGH',cls:'high'};if(s>=130||d>=80)return{label:'ELEVATED',cls:'elevated'};return{label:'NORMAL',cls:'normal'};}
function getPR(p,name){let pr=0;Object.entries(appData).forEach(([k,v])=>{if(k.startsWith(`${p}_`)&&v.exercises)Object.values(v.exercises).forEach(ex=>{if(ex&&ex.exName===name&&parseFloat(ex.weight)>pr)pr=parseFloat(ex.weight);});});return pr;}

window.setPerson=p=>{person=p;document.getElementById('btnJ').classList.toggle('active',p==='j');document.getElementById('btnC').classList.toggle('active',p==='c');updateNavColors();render();};
window.setTab=t=>{tab=t;updateNavColors();render();};
function updateNavColors(){const cls=person==='j'?'active-j':'active-c';document.querySelectorAll('.nav-btn').forEach(b=>b.className='nav-btn');const a=document.getElementById('nav-'+tab);if(a)a.classList.add(cls);}
window.changeDate=o=>{viewDate=new Date(viewDate);viewDate.setDate(viewDate.getDate()+o);render();};
window.goToday=()=>{viewDate=new Date();render();};

function dateNavHTML(){return`<div class="date-nav"><button class="date-nav-btn" onclick="changeDate(-1)">‹</button><div class="date-display"><div class="date-main">${formatDate(viewDate)}</div>${!isToday(viewDate)?`<button class="today-btn" onclick="goToday()">Go to Today</button>`:'<div class="date-sub" style="color:var(--green);font-weight:600">Today</div>'}</div><button class="date-nav-btn" onclick="changeDate(1)">›</button></div>`;}

function render(){const el=document.getElementById('pageContent');if(tab==='dashboard')renderDashboard(el);else if(tab==='workout')renderWorkout(el);else if(tab==='nutrition')renderNutrition(el);else if(tab==='health')renderHealth(el);else renderHistory(el);}

function renderDashboard(el){
  const p=person,name=p==='j'?'Joshua':'Carleigh',today=new Date();
  const td=getDayData(p,today),dow=today.getDay(),wo=(p==='j'?WJ:WC)[dow];
  const done=td.exercises||{},cEx=Object.values(done).filter(v=>v&&v.done).length,tEx=wo?wo.length:0,pct=tEx>0?Math.round((cEx/tEx)*100):0;
  const bpH=getBPHistory(p),lBP=bpH[0],bpSt=lBP?bpStatus(parseInt(lBP.sys),parseInt(lBP.dia)):{label:'No data',cls:''};
  const mH=getMetricsHistory(p),lM=mH[0];
  let wk=0;for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);const dd=getDayData(p,d);if(Object.values(dd.exercises||{}).some(v=>v&&v.done))wk++;}
  const food=td.food||{};let tCal=0;Object.values(food).flat().forEach(it=>tCal+=parseFloat(it.cal)||0);
  const ac=p==='j'?'orange':'blue';
  const op=p==='j'?'c':'j',opName=op==='j'?'Joshua':'Carleigh';
  const opTd=getDayData(op,today),opDow=today.getDay(),opWo=(op==='j'?WJ:WC)[opDow];
  const opDone=opTd.exercises||{},opCEx=Object.values(opDone).filter(v=>v&&v.done).length,opTEx=opWo?opWo.length:0;
  const opBPH=getBPHistory(op),opLBP=opBPH[0],opBpSt=opLBP?bpStatus(parseInt(opLBP.sys),parseInt(opLBP.dia)):{label:'No data',cls:''};
  const opAc=op==='j'?'orange':'blue';
  el.innerHTML=`
    <div class="sec-title">👋 ${name}'s Dashboard</div>
    <div class="dash-grid">
      <div class="dash-card">
        <div class="dash-val ${ac}">${wo?`${cEx}/${tEx}`:'—'}</div>
        <div class="dash-label">Today's Workout</div>
        <div class="dash-sub">${wo?FOCUS[p][dow]:'Rest Day'}</div>
        <div style="margin-top:8px"><div style="height:4px;background:var(--border);border-radius:10px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--${ac});border-radius:10px"></div></div></div>
      </div>
      <div class="dash-card"><div class="dash-val green">${wk}</div><div class="dash-label">Workouts This Week</div><div class="dash-sub">Out of 6 sessions</div></div>
      <div class="dash-card">
        <div class="dash-val ${bpSt.cls==='normal'?'green':bpSt.cls==='elevated'?'yellow':'red'}">${lBP?`${lBP.sys}/${lBP.dia}`:bpSt.label}</div>
        <div class="dash-label">Blood Pressure</div>
        <div class="dash-sub">${lBP?`Pulse: ${lBP.pulse||'—'} • ${bpSt.label}`:bpSt.label}</div>
      </div>
      <div class="dash-card"><div class="dash-val purple">${lM?lM.weight+'lbs':'—'}</div><div class="dash-label">Body Weight</div><div class="dash-sub">${mH.length>1?`Prev: ${mH[1].weight}lbs`:'No history yet'}</div></div>
      <div class="dash-card full"><div class="dash-val yellow">${Math.round(tCal)}</div><div class="dash-label">Calories Today</div><div class="dash-sub">Goal: ${p==='j'?'2,800':'1,900'} kcal • Water: ${td.water||0}/8 cups</div></div>
    </div>
    <div class="sec-title">👀 ${opName}'s Stats</div>
    <div class="dash-grid">
      <div class="dash-card"><div class="dash-val ${opAc}">${opWo?`${opCEx}/${opTEx}`:'—'}</div><div class="dash-label">${opName}'s Workout</div><div class="dash-sub">${opWo?FOCUS[op][opDow]:'Rest Day'}</div></div>
      <div class="dash-card"><div class="dash-val ${opBpSt.cls==='normal'?'green':opBpSt.cls==='elevated'?'yellow':'red'}">${opLBP?`${opLBP.sys}/${opLBP.dia}`:opBpSt.label}</div><div class="dash-label">${opName}'s BP</div><div class="dash-sub">${opLBP?opBpSt.label:'No readings yet'}</div></div>
    </div>
  `;
}

function renderWorkout(el){
  const p=person,name=p==='j'?'Joshua':'Carleigh',dow=viewDate.getDay();
  const wo=(p==='j'?WJ:WC)[dow],data=getDayData(p,viewDate),done=data.exercises||{};
  const cEx=Object.values(done).filter(v=>v&&v.done).length,tEx=wo?wo.length:0,pct=tEx>0?Math.round((cEx/tEx)*100):0;
  let html=dateNavHTML();
  if(!wo){html+=`<div class="rest-day"><div class="rest-icon">🛌</div><h2>REST DAY</h2><p>Recovery is where growth happens. Rest up, ${name}!</p></div>`;el.innerHTML=html;return;}
  html+=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><div><div style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px">${DAYS[dow]}</div><div style="font-size:12px;color:var(--muted)">${name}'s Training</div></div><div style="background:var(--${p==='j'?'orange':'blue'}-dim);color:var(--${p==='j'?'orange':'blue'});font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:20px">🏋️ ${FOCUS[p][dow]}</div></div>`;
  html+=`<div class="prog-wrap"><div class="prog-labels"><span>${cEx}/${tEx} exercises</span><span>${pct}%</span></div><div class="prog-track"><div class="prog-fill ${p}" style="width:${pct}%"></div></div></div>`;
  wo.forEach((ex,i)=>{
    const exData=done[i]||{},isDone=!!exData.done,imgFile=EX_IMG[ex.name],pr=getPR(p,ex.name),cW=parseFloat(exData.weight)||0,isNewPR=cW>0&&cW>pr;
    html+=`<div class="ex-card ${p} ${isDone?'done-card':''}">
      ${imgFile?`<img class="ex-img" src="${IMG}${imgFile}" alt="${ex.name}" onerror="this.outerHTML='<div class=\\'ex-img-placeholder\\'>🏋️</div>'">`:
      `<div class="ex-img-placeholder">🏋️</div>`}
      <div class="ex-body">
        <div class="ex-name"><span>${ex.name}</span><div style="display:flex;gap:5px;align-items:center">${isNewPR?'<span class="pr-badge">🏆 PR</span>':''}<span class="ex-machine">${ex.machine}</span></div></div>
        <div class="ex-sets">📋 ${ex.sets}</div>
        <div class="ex-inputs">
          <div class="field-wrap"><span class="field-label">Weight ${pr>0?`(PR:${pr}lbs)`:''}</span><input class="field-input" type="text" placeholder="lbs/kg" value="${exData.weight||''}" onchange="updateEx(${i},'weight',this.value,'${ex.name.replace(/'/g,"\\'")}')"></div>
          <div class="field-wrap"><span class="field-label">Reps Done</span><input class="field-input" type="text" placeholder="10,10,8" value="${exData.reps||''}" onchange="updateEx(${i},'reps',this.value,'${ex.name.replace(/'/g,"\\'")}')"></div>
        </div>
        <div class="ex-notes">${ex.notes}</div>
        <div class="check-row" onclick="toggleEx(${i})">
          <div class="check-box ${isDone?'done '+p:''}"><svg width="12" height="12" fill="none" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <span class="check-label">${isDone?'Completed ✓':'Mark complete'}</span>
        </div>
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

window.toggleEx=i=>{const d=getDayData(person,viewDate);if(!d.exercises[i])d.exercises[i]={};d.exercises[i].done=!d.exercises[i].done;save();render();};
window.updateEx=(i,field,val,exName)=>{const d=getDayData(person,viewDate);if(!d.exercises[i])d.exercises[i]={};d.exercises[i][field]=val;d.exercises[i].exName=exName;save();};

function renderNutrition(el){
  const p=person,name=p==='j'?'Joshua':'Carleigh',data=getDayData(p,viewDate);
  const food=data.food||{Breakfast:[],Lunch:[],Dinner:[],Snacks:[]};
  const gC=p==='j'?2800:1900,gP=p==='j'?200:130;
  let tCal=0,tPro=0,tCarb=0,tFat=0;
  Object.values(food).flat().forEach(it=>{tCal+=parseFloat(it.cal)||0;tPro+=parseFloat(it.pro)||0;tCarb+=parseFloat(it.carb)||0;tFat+=parseFloat(it.fat)||0;});
  let html=dateNavHTML();
  html+=`<div class="sec-title">📊 ${name}'s Nutrition</div>
  <div class="macro-row">
    <div class="macro-pill"><div class="macro-pill-val cal">${Math.round(tCal)}</div><div class="macro-pill-lbl">Cal</div><div style="font-size:10px;color:var(--muted)">/${gC}</div></div>
    <div class="macro-pill"><div class="macro-pill-val pro">${Math.round(tPro)}g</div><div class="macro-pill-lbl">Protein</div><div style="font-size:10px;color:var(--muted)">/${gP}g</div></div>
    <div class="macro-pill"><div class="macro-pill-val carb">${Math.round(tCarb)}g</div><div class="macro-pill-lbl">Carbs</div></div>
    <div class="macro-pill"><div class="macro-pill-val fat">${Math.round(tFat)}g</div><div class="macro-pill-lbl">Fat</div></div>
  </div>`;
  ['Breakfast','Lunch','Dinner','Snacks'].forEach(meal=>{
    const items=food[meal]||[],mCal=items.reduce((s,it)=>s+(parseFloat(it.cal)||0),0);
    html+=`<div class="meal-block"><div class="meal-hdr"><div class="meal-name">${meal}</div><div class="meal-kcal">${Math.round(mCal)} kcal</div></div>
    <div class="food-cols"><span class="food-col-lbl">Food</span><span class="food-col-lbl">Cal</span><span class="food-col-lbl">Protein</span><span></span></div>`;
    items.forEach((item,idx)=>{html+=`<div class="food-row"><input class="food-input" type="text" placeholder="Food item" value="${item.name||''}" onchange="updateFood('${meal}',${idx},'name',this.value)"><input class="food-input" type="number" placeholder="cal" value="${item.cal||''}" onchange="updateFood('${meal}',${idx},'cal',this.value)"><input class="food-input" type="number" placeholder="g" value="${item.pro||''}" onchange="updateFood('${meal}',${idx},'pro',this.value)"><button class="del-btn" onclick="delFood('${meal}',${idx})">×</button></div>`;});
    html+=`<button class="add-food-btn" onclick="addFood('${meal}')">+ Add to ${meal}</button></div>`;
  });
  const wc=data.water||0;
  html+=`<div class="notes-area"><h3>💧 Water (${wc}/8 cups)</h3><div class="water-row">${Array(8).fill(0).map((_,i)=>`<div class="cup ${i<wc?'filled':''}" onclick="toggleWater(${i})">💧</div>`).join('')}</div></div>`;
  el.innerHTML=html;
}

window.addFood=meal=>{const d=getDayData(person,viewDate);if(!d.food[meal])d.food[meal]=[];d.food[meal].push({name:'',cal:'',pro:''});save();render();};
window.delFood=(meal,idx)=>{const d=getDayData(person,viewDate);d.food[meal].splice(idx,1);save();render();};
window.updateFood=(meal,idx,field,val)=>{const d=getDayData(person,viewDate);if(d.food[meal]&&d.food[meal][idx])d.food[meal][idx][field]=val;save();};
window.toggleWater=idx=>{const d=getDayData(person,viewDate);d.water=(idx+1===d.water?idx:idx+1);save();render();};

function renderHealth(el){
  const p=person,name=p==='j'?'Joshua':'Carleigh',dk=dateKey(viewDate);
  const bp=appData[`bp_${p}_${dk}`]||{sys:'',dia:'',pulse:'',time:'morning',notes:''};
  const metrics=appData[`metrics_${p}_${dk}`]||{weight:'',bodyFat:'',waist:''};
  const st=bpStatus(parseInt(bp.sys),parseInt(bp.dia));
  const mH=getMetricsHistory(p),prevM=mH.find(m=>m.date!==dk);
  const data=getDayData(p,viewDate);
  const bpH=getBPHistory(p).slice(0,14).reverse();
  let html=dateNavHTML();
  html+=`<div class="sec-title">❤️ ${name}'s Health</div>
  <div class="bp-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.8px">Blood Pressure</div>
      ${st.cls?`<div class="bp-status ${st.cls}">${st.label}`+'</div>':''}
    </div>
    <div class="bp-reading-row">
      <div class="bp-field"><label>Systolic</label><input class="bp-input" type="number" placeholder="120" value="${bp.sys||''}" id="bp_sys"></div>
      <div class="bp-field"><label>Diastolic</label><input class="bp-input" type="number" placeholder="80" value="${bp.dia||''}" id="bp_dia"></div>
      <div class="bp-field"><label>Pulse</label><input class="bp-input" type="number" placeholder="72" value="${bp.pulse||''}" id="bp_pulse"></div>
    </div>
    <div class="bp-field" style="margin-bottom:10px"><label>Time of Reading</label>
      <select class="sel-wrap" id="bp_time">
        <option value="morning" ${bp.time==='morning'?'selected':''}>🌅 Morning</option>
        <option value="afternoon" ${bp.time==='afternoon'?'selected':''}>☀️ Afternoon</option>
        <option value="evening" ${bp.time==='evening'?'selected':''}>🌙 Evening</option>
      </select>
    </div>
    <div class="bp-field"><label>Notes</label><input class="txt-input" type="text" placeholder="e.g. after exercise, feeling stressed..." value="${bp.notes||''}" id="bp_notes"></div>
    <button class="save-btn ${p}" onclick="saveBP()">Save Blood Pressure Reading</button>
  </div>
  <div class="sec-title">⚖️ Body Metrics</div>
  <div class="metrics-grid">
    <div class="metric-card" style="grid-column:1/-1">
      <div class="metric-label">Body Weight</div>
      <div class="metric-input-row"><input class="metric-input" type="number" placeholder="175" value="${metrics.weight||''}" id="m_weight" step="0.1"><span class="metric-unit">lbs</span></div>
      ${prevM&&prevM.weight?`<div class="metric-trend">Prev: ${prevM.weight}lbs (${parseFloat(metrics.weight||0)>0?((parseFloat(metrics.weight||0)-parseFloat(prevM.weight))>0?'+':'')+((parseFloat(metrics.weight||0)-parseFloat(prevM.weight)).toFixed(1))+'lbs':'—'})</div>`:''}
    </div>
    <div class="metric-card"><div class="metric-label">Body Fat %</div><div class="metric-input-row"><input class="metric-input" type="number" placeholder="18" value="${metrics.bodyFat||''}" id="m_bodyfat" step="0.1"><span class="metric-unit">%</span></div></div>
    <div class="metric-card"><div class="metric-label">Waist</div><div class="metric-input-row"><input class="metric-input" type="number" placeholder="32" value="${metrics.waist||''}" id="m_waist" step="0.1"><span class="metric-unit">in</span></div></div>
  </div>
  <button class="save-btn ${p}" onclick="saveMetrics()">Save Body Metrics</button>`;

  if(bpH.length>1){
    const sys=bpH.map(d=>parseInt(d.sys)||0),dia=bpH.map(d=>parseInt(d.dia)||0);
    const allV=[...sys,...dia].filter(v=>v>0);
    if(allV.length){
      const minV=Math.min(...allV)-10,maxV=Math.max(...allV)+10,W=300,H=100;
      const xS=W/(bpH.length-1),yS=v=>H-((v-minV)/(maxV-minV))*H;
      const sp=sys.map((v,i)=>`${i===0?'M':'L'}${i*xS},${yS(v)}`).join(' ');
      const dp=dia.map((v,i)=>`${i===0?'M':'L'}${i*xS},${yS(v)}`).join(' ');
      html+=`<div class="sec-title" style="margin-top:16px">📈 BP Trend</div>
      <div class="chart-wrap"><div class="chart-title">Systolic / Diastolic (Last ${bpH.length} readings)</div>
      <div class="chart-area"><svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <line x1="0" y1="${yS(120)}" x2="${W}" y2="${yS(120)}" stroke="rgba(39,201,126,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
        <line x1="0" y1="${yS(140)}" x2="${W}" y2="${yS(140)}" stroke="rgba(251,191,36,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
        <path d="${sp}" fill="none" stroke="var(--red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="${dp}" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        ${sys.map((v,i)=>`<circle cx="${i*xS}" cy="${yS(v)}" r="3" fill="var(--red)"/>`).join('')}
        ${dia.map((v,i)=>`<circle cx="${i*xS}" cy="${yS(v)}" r="3" fill="var(--blue)"/>`).join('')}
      </svg></div>
      <div style="display:flex;gap:16px;margin-top:8px;font-size:11px"><span style="color:var(--red)">● Systolic</span><span style="color:var(--blue)">● Diastolic</span><span style="color:rgba(39,201,126,0.6)">— Normal</span></div>
      </div>`;
    }
  }

  html+=`<div class="notes-area" style="margin-top:4px"><h3>📝 Daily Notes</h3><textarea placeholder="How are you feeling? Energy, sleep, stress..." oninput="updateNote('notes',this.value)">${data.notes||''}</textarea></div>
  <div class="notes-area"><h3>Energy / Mood</h3><div class="mood-row">${['😴 Tired','😐 Okay','😊 Good','💪 Great','🔥 On Fire'].map(m=>`<button class="mood-btn ${data.mood===m?'sel-'+p:''}" onclick="setMood('${m}')">${m}</button>`).join('')}</div></div>`;
  el.innerHTML=html;
}

window.saveBP=()=>{
  const dk=dateKey(viewDate);
  appData[`bp_${person}_${dk}`]={sys:document.getElementById('bp_sys')?.value||'',dia:document.getElementById('bp_dia')?.value||'',pulse:document.getElementById('bp_pulse')?.value||'',time:document.getElementById('bp_time')?.value||'morning',notes:document.getElementById('bp_notes')?.value||'',savedAt:new Date().toISOString()};
  save();render();
};
window.saveMetrics=()=>{
  const dk=dateKey(viewDate);
  appData[`metrics_${person}_${dk}`]={weight:document.getElementById('m_weight')?.value||'',bodyFat:document.getElementById('m_bodyfat')?.value||'',waist:document.getElementById('m_waist')?.value||'',savedAt:new Date().toISOString()};
  save();render();
};
window.updateNote=(field,val)=>{const d=getDayData(person,viewDate);d[field]=val;save();};
window.setMood=m=>{const d=getDayData(person,viewDate);d.mood=d.mood===m?'':m;save();render();};

function renderHistory(el){
  const p=person,name=p==='j'?'Joshua':'Carleigh';
  const bpH=getBPHistory(p),mH=getMetricsHistory(p);
  const mChart=mH.slice(0,30).reverse().filter(m=>m.weight);
  let html=`<div class="sec-title">📅 ${name}'s History</div>`;

  if(mChart.length>1){
    const vals=mChart.map(d=>parseFloat(d.weight)),minV=Math.min(...vals)-2,maxV=Math.max(...vals)+2,W=300,H=100;
    const xS=W/(mChart.length-1),yS=v=>H-((v-minV)/(maxV-minV))*H;
    const path=vals.map((v,i)=>`${i===0?'M':'L'}${i*xS},${yS(v)}`).join(' ');
    const fill=`${path} L${(mChart.length-1)*xS},${H} L0,${H} Z`;
    html+=`<div class="chart-wrap"><div class="chart-title">Body Weight Over Time</div>
    <div class="chart-area"><svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs><linearGradient id="wG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--purple)" stop-opacity="0.3"/><stop offset="100%" stop-color="var(--purple)" stop-opacity="0"/></linearGradient></defs>
      <path d="${fill}" fill="url(#wG)"/>
      <path d="${path}" fill="none" stroke="var(--purple)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${(mChart.length-1)*xS}" cy="${yS(vals[vals.length-1])}" r="4" fill="var(--purple)"/>
    </svg></div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px"><span>${mChart[0].date.slice(5)}</span><span style="color:var(--purple);font-weight:700">${vals[vals.length-1]}lbs</span><span>${mChart[mChart.length-1].date.slice(5)}</span></div>
    </div>`;
  }

  html+=`<div class="sec-title">❤️ Blood Pressure History</div>`;
  if(!bpH.length){html+=`<div style="text-align:center;padding:24px;color:var(--muted);font-size:14px">No BP readings yet.<br>Log your first reading in the Health tab!</div>`;}
  else{bpH.slice(0,30).forEach(e=>{const st=bpStatus(parseInt(e.sys),parseInt(e.dia));html+=`<div class="history-item"><div><div class="history-date">${new Date(e.date).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'})} • ${e.time||''}</div>${e.notes?`<div class="history-note">${e.notes}</div>`:''}</div><div style="text-align:right"><div class="history-val ${st.cls}">${e.sys}/${e.dia}</div><div style="font-size:11px;color:var(--muted)">Pulse: ${e.pulse||'—'}</div><div class="bp-status ${st.cls}" style="font-size:9px;padding:2px 7px;margin-top:3px">${st.label}</div></div></div>`;});}

  html+=`<div class="sec-title">⚖️ Body Metrics History</div>`;
  if(!mH.length){html+=`<div style="text-align:center;padding:24px;color:var(--muted);font-size:14px">No metrics yet.<br>Log your first entry in the Health tab!</div>`;}
  else{mH.slice(0,30).forEach(e=>{html+=`<div class="history-item"><div><div class="history-date">${new Date(e.date).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'})}</div>${e.bodyFat?`<div class="history-note">Body fat: ${e.bodyFat}% • Waist: ${e.waist||'—'}"</div>`:''}</div><div class="history-val" style="color:var(--purple)">${e.weight}lbs</div></div>`;});}

  html+=`<div class="sec-title">💪 Workout History</div>`;
  const wH=Object.entries(appData).filter(([k])=>k.startsWith(`${p}_`)&&!k.includes('bp_')&&!k.includes('metrics_')).map(([k,v])=>({date:k.replace(`${p}_`,''),data:v})).filter(e=>Object.values(e.data.exercises||{}).some(v=>v&&v.done)).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,30);
  if(!wH.length){html+=`<div style="text-align:center;padding:24px;color:var(--muted);font-size:14px">No completed workouts yet!</div>`;}
  else{wH.forEach(e=>{const dow=new Date(e.date+'T12:00:00').getDay(),cEx=Object.values(e.data.exercises||{}).filter(v=>v&&v.done).length,ac=p==='j'?'orange':'blue';html+=`<div class="history-item"><div><div class="history-date">${new Date(e.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'})}</div><div class="history-note">${FOCUS[p][dow]}</div></div><div class="history-val" style="color:var(--${ac})">${cEx} ex</div></div>`;});}

  el.innerHTML=html;
}

setTimeout(()=>{
  document.getElementById('splash').classList.add('out');
  const saved=localStorage.getItem('fb_cfg');
  if(saved){try{initFB(JSON.parse(saved));document.getElementById('app').classList.add('show');}catch(e){document.getElementById('configScreen').classList.add('show');}}
  else document.getElementById('configScreen').classList.add('show');
},1600);
updateNavColors();
setTab('dashboard');
</script>
</body>
</html>
